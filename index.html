<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>福运小猪 · 黄道萌宠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a1a2f; /* 深蓝底 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* 主应用容器 */
        #app {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 900px;
            max-height: 95vh;
            background: radial-gradient(circle at 20% 20%, #0b2542, #041220);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,215,150,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #f5ebd2;
        }

        /* 气泡开场动画层 */
        #bubble-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 30;
        }

        .bubble-pig {
            position: absolute;
            bottom: -60px;
            font-size: 38px;
            opacity: 0.7;
            filter: drop-shadow(0 0 6px #ffb6c1);
            animation: floatUp linear forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0.6; }
            100% { transform: translateY(-120vh) scale(1.1); opacity: 0; }
        }

        /* 主界面 (默认隐藏) */
        #main-interface {
            position: relative;
            z-index: 20;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 18px 16px 12px;
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        #main-interface.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 右上退出 */
        .exit-btn {
            position: absolute;
            top: 18px; right: 18px;
            width: 40px; height: 40px;
            background: rgba(140, 30, 30, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #ffc0c0;
            border: 1px solid #b55;
            box-shadow: 0 4px 8px #00000033;
            cursor: pointer;
            z-index: 50;
            transition: 0.2s;
        }
        .exit-btn:hover { background: #a33; color: white; }

        /* 顶部黄历天气 */
        .header-section {
            text-align: center;
            margin-bottom: 12px;
        }
        .auspicious-day {
            font-size: 26px;
            font-weight: 600;
            text-shadow: 0 2px 8px #ac9f7c;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f9e7b3, #e4c27a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .weather-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 30, 50, 0.55);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1px solid #ccb38c66;
            font-size: 15px;
        }
        .uv-tip { color: #ffddaa; }

        /* 运势卡片 */
        .fortune-area {
            display: flex;
            justify-content: center;
            margin: 8px 0 10px;
        }
        .fortune-btn {
            background: rgba(230, 200, 150, 0.18);
            backdrop-filter: blur(12px);
            border: 2px solid #eac28e;
            border-radius: 60px;
            padding: 14px 32px;
            font-size: 24px;
            font-weight: bold;
            color: #fff3db;
            box-shadow: 0 8px 20px #00000040;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 8px;
        }
        .fortune-btn:active { transform: scale(0.96); background: #b5955f55; }

        /* 萌宠卡片区 */
        .pet-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(20, 40, 60, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            padding: 16px 10px 10px;
            border: 1px solid #bc9a6b40;
            margin-top: 6px;
        }

        .pet-canvas-container {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
        }

        canvas#petCanvas {
            width: 100%;
            max-width: 280px;
            height: auto;
            aspect-ratio: 1/1;
            image-rendering: crisp-edges; 
            filter: drop-shadow(0 8px 12px #00000066);
        }

        /* 开心值条 */
        .happiness-bar-wrap {
            margin: 8px 12px 4px;
            height: 12px;
            background: #2a3f4e;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #b79b6b;
        }
        #happinessFill {
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ffdf7e);
            border-radius: 20px;
            transition: width 0.4s;
        }

        /* 互动圆环区 */
        .action-rings {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 10px 0 6px;
        }
        .ring-item {
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(16px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f1e2c6;
            box-shadow: 0 4px 12px black;
            font-size: 38px;
            cursor: pointer;
            transition: 0.2s;
        }
        .ring-item:active { transform: scale(0.9); background: #ffffff60; }
        .ring-item.disabled { opacity: 0.45; pointer-events: none; filter: grayscale(0.5); }

        /* 底部说明 */
        .pet-tip {
            font-size: 12px; text-align: center; opacity: 0.8;
        }

        /* 运势弹窗——中国风白色祥云边框半透明磨砂 */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #00000070; backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        .fortune-modal {
            width: 340px;
            background: rgba(245, 240, 230, 0.25);
            backdrop-filter: blur(25px);
            border: 3px solid white;
            border-image: repeating-linear-gradient(45deg, #fff8, #faf0d7, #fff) 30;
            border-radius: 48px 48px 40px 40px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px #00000055, inset 0 0 30px #fff3db;
            color: #1e2b2f;
            text-shadow: 0 1px 2px #ffeecc;
            font-weight: 500;
        }
        .stat-row { display: flex; align-items: center; margin: 10px 0; }
        .stat-label { width: 70px; }
        .stat-bar-bg { flex:1; height: 12px; background: #3e3a30; border-radius: 20px; margin:0 8px; }
        .stat-bar-fill { height: 12px; border-radius: 20px; background: #e5b86b; width: 70%; }
        .lucky-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
        .close-modal { text-align: center; margin-top: 18px; }
        .close-modal span { background: #a58e71; padding: 8px 30px; border-radius: 40px; color: #fffbee; }

        /* 辅助 */
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <!-- 退出按钮 (始终可点) -->
    <div class="exit-btn" id="exitApp">✕</div>

    <!-- 气泡层 -->
    <div id="bubble-layer"></div>

    <!-- 主界面 -->
    <div id="main-interface">
        <div class="header-section">
            <div class="auspicious-day" id="auspiciousText">乙巳年 三月初九 宜祈福</div>
            <div class="weather-panel">
                <span>🌤️ 23° 多云</span>
                <span class="uv-tip">☀️紫外线 中等 · 建议防晒衣</span>
            </div>
            <div style="font-size:13px; margin-top: 2px;">👕 薄外套+遮阳帽</div>
        </div>

        <div class="fortune-area">
            <div class="fortune-btn" id="fortuneBtn">✨ 运 势 ✨</div>
        </div>

        <!-- 萌宠区域 -->
        <div class="pet-section">
            <div class="pet-canvas-container">
                <canvas id="petCanvas" width="300" height="300"></canvas>
            </div>
            <div class="happiness-bar-wrap">
                <div id="happinessFill" style="width: 80%;"></div>
            </div>
            <!-- 三个磨砂白圆环 -->
            <div class="action-rings">
                <div class="ring-item" id="feedRing">🍰</div>
                <div class="ring-item" id="drinkRing">🥤</div>
                <div class="ring-item" id="sleepRing">🌸</div>
            </div>
            <div class="pet-tip">点击小猪玩耍 · 喂食/喝水/睡觉</div>
        </div>
    </div>
</div>

<!-- 运势弹窗 -->
<div id="fortuneModal" class="modal-overlay hidden">
    <div class="fortune-modal">
        <h3 style="text-align:center; color:#2f2416;">🐷 今日福运</h3>
        <div class="stat-row"><span class="stat-label">事业</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:78%"></div></div><span>78</span></div>
        <div class="stat-row"><span class="stat-label">爱情</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:65%"></div></div><span>65</span></div>
        <div class="stat-row"><span class="stat-label">健康</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:88%"></div></div><span>88</span></div>
        <div class="stat-row"><span class="stat-label">财运</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:72%"></div></div><span>72</span></div>
        <div class="lucky-grid">
            <div>🐕 贵人: 虎</div><div>🔢 幸运数: 3,8</div>
            <div>🎨 幸运色: 琥珀金</div><div>🧭 喜神: 东南</div>
        </div>
        <div>✅ 适宜: 签约 · 出行 · 会友</div>
        <div>❌ 忌讳: 争吵 · 动土</div>
        <div class="close-modal"><span id="closeModalBtn">关 闭</span></div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 气泡开场 ----------
        const bubbleLayer = document.getElementById('bubble-layer');
        const mainUI = document.getElementById('main-interface');
        function startBubbleShow() {
            for(let i=0; i<35; i++) {
                setTimeout(() => {
                    const pig = document.createElement('div');
                    pig.className = 'bubble-pig';
                    pig.textContent = '🐷';
                    pig.style.left = Math.random() * 90 + 5 + '%';
                    pig.style.animationDuration = (3.5 + Math.random() * 5) + 's';
                    pig.style.fontSize = (28 + Math.floor(Math.random()*36)) + 'px';
                    bubbleLayer.appendChild(pig);
                    setTimeout(() => pig.remove(), 9000);
                }, i * 80);
            }
            // 3.5秒后切换主界面
            setTimeout(() => {
                mainUI.classList.add('show');
            }, 2800);
        }
        startBubbleShow();

        // ---------- 全局变量 ----------
        const canvas = document.getElementById('petCanvas');
        const ctx = canvas.getContext('2d');
        const happinessFill = document.getElementById('happinessFill');
        
        // 状态定义
        let happiness = 80;            // 0-100
        let isSleeping = false;
        let currentEmotion = 'happy';   // happy, littleSad, sad, angry, sleeping
        let animationFrame = null;
        let feedingAnim = 0;            // 0-1 进食/喝水动画进度
        let feedType = null;            // 'eat' or 'drink'
        let interactionCooldown = false;
        
        // 萌宠互动动画计数器 (玩耍)
        let playAnim = 0;  // 0-1
        
        // 时间相关控制
        let lastInteractionTime = Date.now();
        let autoSleepTimeout = null;
        let wakeCheckInterval = null;

        // 喂食/喝水/睡觉元素
        const feedRing = document.getElementById('feedRing');
        const drinkRing = document.getElementById('drinkRing');
        const sleepRing = document.getElementById('sleepRing');
        const exitBtn = document.getElementById('exitApp');
        const fortuneBtn = document.getElementById('fortuneBtn');
        const modal = document.getElementById('fortuneModal');
        const closeModal = document.getElementById('closeModalBtn');

        // 食物池
        const foods = ['🍰','🍦','🥤']; // 蛋糕 冰淇淋 可乐
        // 更新食物显示
        function randomizeFood() {
            const rand = foods[Math.floor(Math.random() * foods.length)];
            feedRing.textContent = rand;
        }
        randomizeFood();
        drinkRing.textContent = '🧃'; // 瓶装水风格

        // ---------- 绘画萌宠 (Q版小猪) ----------
        function drawPet() {
            ctx.clearRect(0,0,300,300);
            
            // 背景装饰
            ctx.shadowColor = '#ac9f7c';
            ctx.shadowBlur = 14;
            
            // 根据状态改变表情
            let face = 'happy';
            if(isSleeping) face = 'sleeping';
            else if(happiness <=100 && happiness>60) face='happy';
            else if(happiness<=60 && happiness>40) face='littleSad';
            else if(happiness<=40 && happiness>20) face='sad';
            else if(happiness<=20) face='angry';
            
            // 绘制猪猪 (Q版)
            // 身体
            ctx.beginPath();
            ctx.ellipse(150, 170, 70, 60, 0, 0, Math.PI*2);
            ctx.fillStyle = '#FFB7C5';
            ctx.shadowColor = '#b38b6d';
            ctx.fill();
            ctx.strokeStyle = '#c47a7a';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 耳朵
            ctx.fillStyle = '#FFA5B0';
            ctx.beginPath(); ctx.ellipse(105, 120, 20, 28, -0.2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(195, 120, 20, 28, 0.2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            
            // 鼻子
            ctx.fillStyle = '#E57373';
            ctx.beginPath(); ctx.ellipse(150, 190, 18, 14, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#a55'; ctx.stroke();
            ctx.fillStyle = '#4a2e2e';
            ctx.beginPath(); ctx.arc(142, 188, 3, 0, 2*Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(158, 188, 3, 0, 2*Math.PI); ctx.fill();
            
            // 眼睛和表情
            ctx.fillStyle = '#2F1E0F';
            if(face === 'sleeping') {
                // 闭眼
                ctx.beginPath(); ctx.arc(125, 145, 6, 0, Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(175, 145, 6, 0, Math.PI); ctx.fill();
                // zzz
                ctx.font = 'bold 22px sans'; ctx.fillStyle = '#2b4f6e'; ctx.fillText('💤', 200, 100);
            } else {
                ctx.beginPath(); ctx.arc(125, 148, 7, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(175, 148, 7, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(121, 143, 3,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(171, 143, 3,0,2*Math.PI); ctx.fill();
                
                // 眉毛/情绪
                ctx.strokeStyle = '#2c1e0e'; ctx.lineWidth = 3;
                if(face==='angry'){ ctx.beginPath(); ctx.moveTo(115,130); ctx.lineTo(135,138); ctx.moveTo(185,130); ctx.lineTo(165,138); ctx.stroke(); }
                else if(face==='sad'){ ctx.beginPath(); ctx.moveTo(115,140); ctx.lineTo(135,135); ctx.moveTo(185,140); ctx.lineTo(165,135); ctx.stroke(); }
            }

            // 喂食/喝水动画
            if(feedingAnim > 0) {
                ctx.font = '36px sans'; ctx.fillStyle = '#fbe39a';
                ctx.fillText(feedType==='eat'?'🍰':'🧃', 200, 70);
                feedingAnim *= 0.85; if(feedingAnim<0.02) feedingAnim=0;
            }
            if(playAnim>0){ 
                ctx.font = '30px sans'; ctx.fillText('✨', 80, 60); 
                playAnim*=0.8; if(playAnim<0.01) playAnim=0;
            }
            requestAnimationFrame(drawPet);
        }
        drawPet();

        // 开心值UI更新
        function updateHappinessUI() {
            happinessFill.style.width = happiness + '%';
        }

        // 开心值变动
        function modifyHappiness(delta) {
            happiness = Math.min(100, Math.max(0, happiness + delta));
            updateHappinessUI();
            lastInteractionTime = Date.now();
        }

        // 玩耍互动
        function playWithPet() {
            if(isSleeping) return;
            playAnim = 1.0;
            modifyHappiness(2);
        }

        // 喂食
        function feedAction() {
            if(isSleeping) return;
            feedingAnim = 1.0; feedType = 'eat';
            modifyHappiness(20);
            randomizeFood();
        }
        function drinkAction() {
            if(isSleeping) return;
            feedingAnim = 1.0; feedType = 'drink';
            modifyHappiness(10);
        }

        // 睡觉/起床逻辑
        function goToSleep() {
            if(isSleeping) return;
            isSleeping = true;
            happiness = Math.min(100, happiness+5);
            updateHappinessUI();
        }
        function wakeUp() {
            if(!isSleeping) return;
            isSleeping = false;
            happiness = 80; // 起床开心
            updateHappinessUI();
        }

        // 每小时减开心值
        setInterval(() => {
            if(isSleeping) return;
            const now = Date.now();
            if(now - lastInteractionTime > 3600000) { // 1小时
                modifyHappiness(-20);
                lastInteractionTime = now; 
            }
        }, 60000);

        // 时间检测自动睡觉/起床
        function checkAutoSleepWake() {
            const d = new Date();
            const hour = d.getHours();
            // 自动起床 7-9点
            if(hour>=7 && hour<9 && isSleeping) wakeUp();
            // 自动睡觉 21-24点
            if(hour>=21 && hour<24 && !isSleeping) goToSleep();
            // 更新第三个圆环显示
            updateSleepRingIcon(hour);
        }
        function updateSleepRingIcon(hour) {
            if(hour>=7 && hour<9) sleepRing.textContent = '🐓';
            else if(hour>=9 && hour<21) sleepRing.textContent = ['🌸','🌼','🌺'][Math.floor(Math.random()*3)];
            else if(hour>=21 || hour<7) sleepRing.textContent = '🛏️💤';
        }
        setInterval(checkAutoSleepWake, 60000);
        checkAutoSleepWake();

        // 点击萌宠玩耍
        canvas.addEventListener('click', ()=>{
            if(isSleeping) return;
            playWithPet();
        });

        // 圆环事件
        feedRing.addEventListener('click', ()=>{
            if(isSleeping) return;
            feedAction();
        });
        drinkRing.addEventListener('click', ()=>{
            if(isSleeping) return;
            drinkAction();
        });
        sleepRing.addEventListener('click', ()=>{
            const hour = new Date().getHours();
            if(hour>=7 && hour<9) wakeUp();
            else if(hour>=21 || hour<7) goToSleep();
            // 其他时间点击小花无反应
        });

        // 运势弹窗
        fortuneBtn.addEventListener('click', ()=> modal.classList.remove('hidden'));
        closeModal.addEventListener('click', ()=> modal.classList.add('hidden'));
        modal.addEventListener('click', (e)=>{ if(e.target === modal) modal.classList.add('hidden'); });

        // 退出“返回桌面” (模拟关闭)
        exitBtn.addEventListener('click', ()=>{
            if(confirm('确定退出福运小猪？')) {
                window.location.href = 'about:blank';
            }
        });

        // 黄历文字简单动态
        function updateAuspicious() {
            const now = new Date();
            document.getElementById('auspiciousText').innerText = 
                `乙巳年 ${now.getMonth()+1}月${now.getDate()}日 · 宜纳福`;
        }
        updateAuspicious();
        updateHappinessUI();

        // 萌宠状态描述 (无需额外)
    })();
</script>
</body>
</html>
