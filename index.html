<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>中国风多用户独立版 3D 小猪萌宠养殖 + 每日黄历运势</title>
  <style>
    :root{
      --bg1:#0a1a3a;
      --bg2:#0d2b4e;
      --glass:rgba(255,255,255,0.10);
      --glass-strong:rgba(255,255,255,0.16);
      --line:rgba(201,169,110,0.45);
      --gold:#C9A96E;
      --gold-soft:rgba(201,169,110,0.25);
      --red:#B22222;
      --cyan:rgba(102, 204, 255, 0.75);
      --green:rgba(82, 188, 160, 0.82);
      --text:#eef4ff;
      --muted:#cdd8ea;
      --shadow:0 10px 30px rgba(0,0,0,0.28);
      --blur:12px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.06), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(201,169,110,0.07), transparent 22%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background-image:url("data:image/svg+xml;utf8,\
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 800'>\
        <g fill='none' stroke='%23d8e6ff' stroke-opacity='0.22' stroke-width='2'>\
          <path d='M80 170c35-34 88-34 123 0 8 8 15 17 21 28 20-20 48-32 79-32 58 0 106 39 119 91 9-5 19-8 30-8 33 0 60 27 60 60H80c0-29 24-53 53-53 8 0 16 2 23 5 7-37 28-69 56-91z'/>\
          <path d='M450 500c29-28 72-28 101 0 7 7 13 14 17 23 17-16 40-26 65-26 48 0 88 32 99 75 8-4 15-6 24-6 28 0 50 22 50 50H450c0-24 20-44 44-44 7 0 13 1 19 4 6-31 24-57 47-76z'/>\
          <path d='M190 610c21-20 53-20 74 0 5 5 10 11 13 17 12-12 29-19 47-19 35 0 64 23 72 55 5-3 10-4 17-4 20 0 37 17 37 37H190c0-18 15-33 33-33 5 0 9 1 14 3 5-22 18-42 36-56z'/>\
        </g>\
      </svg>");
      background-size:700px 700px;
      animation:cloudDrift 40s linear infinite;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 35%),
        radial-gradient(circle at 50% 100%, rgba(255,153,170,0.05), transparent 30%);
      mix-blend-mode:screen;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    #scene-container{
      position:absolute;
      inset:0;
      z-index:1;
    }

    canvas.webgl{
      display:block;
      width:100%;
      height:100%;
    }

    #ui-layer{
      position:absolute;
      inset:0;
      z-index:5;
      pointer-events:none;
    }

    .panel{
      position:absolute;
      background:linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border:1px solid var(--line);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.05);
      border-radius:18px;
      overflow:hidden;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:18px;
      padding:1px;
      background:
        linear-gradient(135deg, rgba(201,169,110,0.7), rgba(255,255,255,0.04), rgba(201,169,110,0.45));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
              mask-composite:exclude;
      opacity:.8;
    }

    .panel .corner{
      position:absolute;
      width:18px;
      height:18px;
      border:1px solid rgba(201,169,110,0.65);
      opacity:.7;
    }

    .panel .corner.lt{left:8px;top:8px;border-right:none;border-bottom:none;}
    .panel .corner.rt{right:8px;top:8px;border-left:none;border-bottom:none;}
    .panel .corner.lb{left:8px;bottom:8px;border-right:none;border-top:none;}
    .panel .corner.rb{right:8px;bottom:8px;border-left:none;border-top:none;}

    .title-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .title{
      font-size:16px;
      letter-spacing:2px;
      color:#fff7de;
      text-shadow:0 0 8px rgba(201,169,110,0.25);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .title::before{
      content:"◆";
      color:var(--gold);
      font-size:12px;
    }

    .subtext,.muted{
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    #top-left{
      top:16px;
      left:16px;
      width:min(420px, calc(100vw - 32px));
      padding:16px 16px 14px;
      pointer-events:auto;
    }

    #fortune-center{
      top:16px;
      left:50%;
      transform:translateX(-50%);
      width:min(360px, calc(100vw - 32px));
      padding:14px;
      text-align:center;
      pointer-events:auto;
    }

    #right-panel{
      top:16px;
      right:16px;
      width:min(320px, calc(100vw - 32px));
      padding:16px;
      pointer-events:auto;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .mini-card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;
      padding:10px 12px;
      min-height:72px;
      position:relative;
      overflow:hidden;
    }

    .mini-card::after{
      content:"";
      position:absolute;
      right:-16px;
      bottom:-16px;
      width:56px;
      height:56px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(201,169,110,0.18), transparent 70%);
    }

    .mini-title{
      font-size:12px;
      color:#d8e6ff;
      margin-bottom:6px;
      letter-spacing:1px;
    }

    .mini-value{
      font-size:15px;
      color:#fff;
      line-height:1.5;
    }

    .hl-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:6px;
      font-size:13px;
      color:#eef4ff;
    }

    .weather-row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-top:12px;
    }

    .weather-icon{
      width:46px;
      height:46px;
      position:relative;
      flex:0 0 46px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(255,240,180,0.95), rgba(255,206,95,0.75) 55%, rgba(255,180,90,0.12) 70%, transparent 71%);
      box-shadow:0 0 18px rgba(255,214,130,0.24);
    }

    .weather-icon::before{
      content:"";
      position:absolute;
      left:7px;
      bottom:5px;
      width:32px;
      height:16px;
      background:rgba(235,243,255,0.85);
      border-radius:12px;
      box-shadow:
        10px -7px 0 2px rgba(235,243,255,0.88),
        20px 0 0 0 rgba(235,243,255,0.78);
    }

    .weather-text{
      flex:1;
      min-width:0;
    }

    .luck-orb-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-top:6px;
    }

    .luck-orb{
      position:relative;
      width:88px;
      height:88px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      pointer-events:auto;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55), rgba(130,180,255,0.32) 20%, rgba(76,114,190,0.45) 48%, rgba(16,36,72,0.92) 76%),
        radial-gradient(circle at 50% 70%, rgba(255,153,170,0.16), transparent 50%);
      box-shadow:
        0 0 0 2px rgba(201,169,110,0.48),
        0 0 28px rgba(136,170,255,0.18),
        inset 0 0 24px rgba(255,255,255,0.09);
      transition:transform .25s ease, box-shadow .25s ease;
      animation:orbFloat 3s ease-in-out infinite;
    }

    .luck-orb:hover{
      transform:scale(1.06);
      box-shadow:
        0 0 0 2px rgba(201,169,110,0.68),
        0 0 36px rgba(136,170,255,0.26),
        inset 0 0 28px rgba(255,255,255,0.14);
    }

    .luck-orb::before{
      content:"";
      position:absolute;
      inset:11px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.22);
    }

    .luck-orb::after{
      content:"求签";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff7de;
      letter-spacing:3px;
      font-size:16px;
      text-indent:3px;
      text-shadow:0 2px 10px rgba(0,0,0,0.3);
    }

    .fortune-hint{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:1px;
    }

    .pet-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .pet-name-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .pet-name{
      font-size:20px;
      color:#fff7de;
      letter-spacing:2px;
    }

    .ink-btn{
      position:relative;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      color:#fff7de;
      background:linear-gradient(180deg, rgba(178,34,34,0.88), rgba(120,16,16,0.92));
      box-shadow:0 8px 16px rgba(80,15,15,0.28), inset 0 0 0 1px rgba(255,255,255,0.12);
      cursor:pointer;
      pointer-events:auto;
      transition:transform .2s ease, filter .2s ease;
      font-size:13px;
      letter-spacing:1px;
    }

    .ink-btn:hover{ transform:translateY(-1px); filter:brightness(1.08);}
    .ink-btn:active{ transform:translateY(1px) scale(.98);}
    .ink-btn[disabled]{ opacity:.5; cursor:not-allowed; }

    .rename-btn{
      width:28px;
      height:28px;
      padding:0;
      min-width:28px;
      border-radius:50%;
      background:linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
      border:1px solid rgba(201,169,110,0.4);
      position:relative;
      pointer-events:auto;
      cursor:pointer;
    }

    .rename-btn::before{
      content:"";
      position:absolute;
      width:12px;
      height:3px;
      background:#fff7de;
      left:8px;
      top:13px;
      transform:rotate(-35deg);
      border-radius:2px;
      box-shadow:0 0 0 1px rgba(0,0,0,0.06);
    }

    .rename-btn::after{
      content:"";
      position:absolute;
      width:0;height:0;
      border-left:4px solid #fff7de;
      border-top:3px solid transparent;
      border-bottom:3px solid transparent;
      left:16px;
      top:10px;
      transform:rotate(-35deg);
    }

    .status-block{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.07);
    }

    .progress-wrap{
      margin-top:8px;
    }

    .progress-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:6px;
      font-size:13px;
    }

    .canvas-bar{
      width:100%;
      height:22px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(201,169,110,0.25);
      display:block;
    }

    .state-text{
      margin-top:10px;
      font-size:13px;
      line-height:1.7;
      color:#eef4ff;
    }

    .diary-toggle{
      margin-top:12px;
      width:100%;
    }

    .diary-panel{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(204,187,145,0.12), rgba(108,82,54,0.12));
      border:1px solid rgba(201,169,110,0.28);
      max-height:0;
      overflow:hidden;
      transition:max-height .35s ease, padding .35s ease, opacity .35s ease;
      opacity:0;
    }

    .diary-panel.open{
      max-height:240px;
      opacity:1;
    }

    .diary-item{
      padding:8px 0;
      border-bottom:1px dashed rgba(201,169,110,0.25);
      font-size:13px;
      color:#f3f6ff;
      line-height:1.6;
    }

    .diary-item:last-child{ border-bottom:none; }

    #bottom-controls{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      z-index:6;
      pointer-events:auto;
      width:min(420px, calc(100vw - 20px));
    }

    .round-btn{
      position:relative;
      width:84px;
      height:84px;
      border-radius:50%;
      border:1px solid rgba(201,169,110,0.42);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), rgba(136,255,220,0.08) 30%, rgba(70,154,140,0.60) 65%, rgba(23,82,77,0.88));
      box-shadow:
        0 10px 25px rgba(0,0,0,0.28),
        inset 0 0 20px rgba(255,255,255,0.08),
        0 0 0 3px rgba(255,255,255,0.03);
      cursor:pointer;
      transition:transform .22s ease, filter .22s ease, opacity .22s ease;
      overflow:hidden;
    }

    .round-btn:hover{ transform:translateY(-4px) scale(1.05);}
    .round-btn:active{ transform:translateY(-1px) scale(.98);}
    .round-btn[disabled]{ opacity:.45; cursor:not-allowed; transform:none; }

    .round-btn .label{
      position:absolute;
      left:50%;
      bottom:7px;
      transform:translateX(-50%);
      font-size:12px;
      color:#f5fbff;
      letter-spacing:1px;
      text-shadow:0 2px 6px rgba(0,0,0,0.45);
      pointer-events:none;
      white-space:nowrap;
    }

    .icon-canvas{
      position:absolute;
      inset:11px 11px 24px 11px;
      width:calc(100% - 22px);
      height:calc(100% - 35px);
      pointer-events:none;
    }

    #outfit-btn{
      position:absolute;
      right:24px;
      bottom:122px;
      z-index:6;
      width:72px;
      height:72px;
      border-radius:50%;
      pointer-events:auto;
      cursor:pointer;
      border:1px solid rgba(201,169,110,0.5);
      background:
        radial-gradient(circle at 50% 35%, rgba(255,244,225,0.85), rgba(255,211,118,0.25) 20%, rgba(156,88,160,0.22) 36%, rgba(78,44,116,0.94) 72%);
      box-shadow:0 12px 24px rgba(0,0,0,0.28), inset 0 0 18px rgba(255,255,255,0.12);
      transition:transform .25s ease;
    }

    #outfit-btn:hover{ transform:scale(1.06) rotate(8deg); }

    #outfit-btn::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:36px;
      height:36px;
      transform:translate(-50%,-50%);
      border-radius:50% 50% 45% 45%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,220,110,0.9) 0 22%, transparent 24%),
        conic-gradient(from 0deg, #f3b8ff, #ffe08a, #ffd2d2, #c2f0da, #f3b8ff);
      clip-path:path("M18 2 C22 8 31 10 34 18 C26 20 23 26 18 34 C13 26 10 20 2 18 C5 10 14 8 18 2 Z");
      filter:drop-shadow(0 0 8px rgba(255,230,150,0.25));
    }

    #bubble-hint{
      position:absolute;
      left:50%;
      top:46%;
      transform:translate(-50%,-50%);
      z-index:6;
      pointer-events:none;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      background:rgba(255,255,255,0.88);
      color:#7b4b5f;
      border-radius:20px;
      padding:10px 16px;
      border:1px solid rgba(201,169,110,0.35);
      box-shadow:0 8px 22px rgba(0,0,0,0.18);
      font-size:14px;
      letter-spacing:1px;
    }

    #bubble-hint.show{
      opacity:1;
      transform:translate(-50%,-60%);
      animation:bubbleFloat 2s ease-in-out infinite;
    }

    .modal-mask{
      position:absolute;
      inset:0;
      z-index:20;
      background:rgba(3,10,22,0.42);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      display:none;
      align-items:center;
      justify-content:center;
      pointer-events:auto;
      padding:18px;
    }

    .modal-mask.show{ display:flex; }

    .scroll-modal{
      position:relative;
      width:min(520px, 100%);
      max-height:min(86vh, 760px);
      overflow:auto;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(93,65,38,0.25), rgba(255,248,231,0.08)),
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border:1px solid rgba(201,169,110,0.5);
      box-shadow:0 24px 50px rgba(0,0,0,0.32);
      color:#fff;
      padding:18px 18px 20px;
    }

    .scroll-modal::before,
    .scroll-modal::after{
      content:"";
      position:absolute;
      left:14px;
      right:14px;
      height:10px;
      border-radius:999px;
      background:linear-gradient(90deg, #8c6239, #c9a96e, #8c6239);
      box-shadow:0 2px 8px rgba(0,0,0,0.25);
    }

    .scroll-modal::before{ top:8px; }
    .scroll-modal::after{ bottom:8px; }

    .modal-title{
      margin:8px 0 14px;
      text-align:center;
      font-size:20px;
      color:#fff7de;
      letter-spacing:3px;
    }

    .form-row{
      margin:12px 0;
    }

    .form-label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#f4f0de;
      letter-spacing:1px;
    }

    .text-input{
      width:100%;
      height:46px;
      border-radius:12px;
      border:1px solid rgba(201,169,110,0.35);
      background:rgba(255,255,255,0.12);
      color:#fff;
      padding:0 14px;
      outline:none;
      font-size:15px;
    }

    .text-input::placeholder{ color:rgba(255,255,255,0.52); }

    .modal-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .fortune-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .fortune-item{
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;
      padding:12px;
    }

    .fortune-item h4{
      margin:0 0 8px;
      font-size:14px;
      color:#fff7de;
      font-weight:normal;
      letter-spacing:1px;
    }

    .fortune-num{
      font-size:24px;
      color:#fff;
      margin-bottom:8px;
    }

    .fortune-bar{
      width:100%;
      height:16px;
      display:block;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(201,169,110,0.25);
    }

    .fortune-meta{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      font-size:13px;
      line-height:1.9;
      color:#eef4ff;
    }

    .fortune-list-wrap{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .fortune-list{
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
    }

    .fortune-list h4{
      margin:0 0 8px;
      color:#fff7de;
      font-size:14px;
      font-weight:normal;
    }

    .fortune-list ul{
      margin:0;
      padding-left:18px;
      color:#eef4ff;
      line-height:1.8;
      font-size:13px;
    }

    #achievement-toast{
      position:absolute;
      left:16px;
      bottom:120px;
      z-index:12;
      min-width:240px;
      max-width:min(360px, calc(100vw - 32px));
      padding:14px 16px;
      border-radius:16px;
      background:
        linear-gradient(180deg, rgba(132,93,52,0.40), rgba(255,255,255,0.10));
      border:1px solid rgba(201,169,110,0.5);
      box-shadow:0 16px 32px rgba(0,0,0,0.25);
      transform:translateX(-120%);
      opacity:0;
      pointer-events:none;
    }

    #achievement-toast.show{
      animation:scrollIn 4s ease forwards;
    }

    .toast-title{
      color:#fff7de;
      font-size:15px;
      margin-bottom:6px;
      letter-spacing:2px;
    }

    .toast-text{
      color:#eef4ff;
      font-size:13px;
      line-height:1.6;
    }

    .hidden{
      display:none !important;
    }

    @keyframes orbFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-6px); }
    }

    @keyframes cloudDrift{
      from{ transform:translate3d(0,0,0); }
      to{ transform:translate3d(-80px, 30px, 0); }
    }

    @keyframes bubbleFloat{
      0%,100%{ transform:translate(-50%,-60%); }
      50%{ transform:translate(-50%,-68%); }
    }

    @keyframes scrollIn{
      0%{ transform:translateX(-120%); opacity:0; }
      12%{ transform:translateX(0); opacity:1; }
      82%{ transform:translateX(0); opacity:1; }
      100%{ transform:translateX(-120%); opacity:0; }
    }

    @keyframes fadeScale{
      from{ opacity:0; transform:scale(.8); }
      to{ opacity:1; transform:scale(1); }
    }

    @keyframes rotateSlow{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    .rotating{
      animation:rotateSlow 12s linear infinite;
    }

    @media (max-width: 900px){
      #top-left{
        width:calc(100vw - 24px);
        left:12px;
        top:12px;
      }

      #fortune-center{
        top:auto;
        left:12px;
        right:12px;
        bottom:116px;
        transform:none;
        width:auto;
      }

      #right-panel{
        top:auto;
        right:12px;
        left:12px;
        bottom:210px;
        width:auto;
      }

      #outfit-btn{
        right:14px;
        bottom:306px;
        width:64px;
        height:64px;
      }

      #achievement-toast{
        left:12px;
        bottom:304px;
      }
    }

    @media (max-width: 600px){
      .title{ font-size:15px; }
      .pet-name{ font-size:18px; }
      #bottom-controls{
        gap:10px;
        bottom:12px;
      }
      .round-btn{
        width:78px;
        height:78px;
      }
      .round-btn .label{
        font-size:11px;
      }
      .fortune-grid,
      .fortune-list-wrap,
      .calendar-grid{
        grid-template-columns:1fr;
      }
      .scroll-modal{
        padding:16px 14px 18px;
      }
      #bubble-hint{
        top:41%;
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>

    <div id="ui-layer">
      <div id="top-left" class="panel">
        <i class="corner lt"></i><i class="corner rt"></i><i class="corner lb"></i><i class="corner rb"></i>
        <div class="title-bar">
          <div class="title">黄历时辰与天气</div>
          <div class="muted" id="clockText">--:--</div>
        </div>
        <div class="hl-line">
          <span id="lunarLabel">今日值神：待定</span>
          <span id="timeRangeLabel">时辰：待定</span>
        </div>
        <div class="weather-row">
          <div class="weather-icon"></div>
          <div class="weather-text">
            <div class="mini-value" id="weatherText">晴转微云</div>
            <div class="subtext" id="wearAdvice">穿衣建议：轻薄外套，早晚留意微凉。</div>
          </div>
        </div>
        <div class="calendar-grid">
          <div class="mini-card">
            <div class="mini-title">紫外线</div>
            <div class="mini-value" id="uvText">中等，午后适度防晒</div>
          </div>
          <div class="mini-card">
            <div class="mini-title">防晒提醒</div>
            <div class="mini-value" id="sunText">外出久留可备遮阳物</div>
          </div>
          <div class="mini-card">
            <div class="mini-title">宜</div>
            <div class="mini-value" id="yiSummary">纳福、会友、整物</div>
          </div>
          <div class="mini-card">
            <div class="mini-title">忌</div>
            <div class="mini-value" id="jiSummary">争执、熬夜、心急</div>
          </div>
        </div>
      </div>

      <div id="fortune-center" class="panel">
        <i class="corner lt"></i><i class="corner rt"></i><i class="corner lb"></i><i class="corner rb"></i>
        <div class="title-bar" style="justify-content:center;">
          <div class="title">运势占卜</div>
        </div>
        <div class="luck-orb-wrap">
          <button id="fortuneBtn" class="luck-orb rotating" aria-label="求签"></button>
        </div>
        <div class="fortune-hint">轻触水晶球，查看今日签文与四运势</div>
      </div>

      <div id="right-panel" class="panel">
        <i class="corner lt"></i><i class="corner rt"></i><i class="corner lb"></i><i class="corner rb"></i>
        <div class="pet-header">
          <div class="pet-name-wrap">
            <div class="pet-name" id="petNameText">嘟嘟</div>
            <button class="rename-btn" id="renameBtn" aria-label="改名"></button>
          </div>
          <button class="ink-btn" id="newUserBtn">新客</button>
        </div>

        <div class="status-block">
          <div class="progress-head">
            <span>开心值</span>
            <span id="happinessText">80 / 100</span>
          </div>
          <div class="progress-wrap">
            <canvas id="happinessCanvas" class="canvas-bar" width="280" height="22"></canvas>
          </div>
          <div class="state-text">
            当前状态：<span id="moodText">开心</span><br/>
            用户编号：<span id="userIdText">--</span>
          </div>
        </div>

        <button class="ink-btn diary-toggle" id="diaryToggleBtn">展开心情日记</button>
        <div class="diary-panel" id="diaryPanel"></div>
      </div>

      <div id="bubble-hint">求抱抱</div>

      <div id="bottom-controls">
        <button class="round-btn" id="feedBtn" aria-label="食缘">
          <canvas class="icon-canvas" id="feedIcon" width="60" height="48"></canvas>
          <span class="label">食缘</span>
        </button>

        <button class="round-btn" id="waterBtn" aria-label="水韵">
          <canvas class="icon-canvas" id="waterIcon" width="60" height="48"></canvas>
          <span class="label">水韵</span>
        </button>

        <button class="round-btn" id="timeBtn" aria-label="时辰">
          <canvas class="icon-canvas" id="timeIcon" width="60" height="48"></canvas>
          <span class="label" id="timeBtnLabel">时辰</span>
        </button>
      </div>

      <button id="outfit-btn" aria-label="切换装扮"></button>

      <div id="achievement-toast">
        <div class="toast-title" id="toastTitle">成就解锁</div>
        <div class="toast-text" id="toastText">你获得了新的荣誉。</div>
      </div>

      <div class="modal-mask" id="registerModal">
        <div class="scroll-modal">
          <div class="modal-title">初见卷轴</div>
          <div class="subtext" style="text-align:center;">为你的萌宠取一个名字，往后将随缘常伴。</div>
          <div class="form-row">
            <label class="form-label" for="registerNameInput">萌宠名字</label>
            <input id="registerNameInput" class="text-input" maxlength="8" placeholder="默认：嘟嘟" />
          </div>
          <div class="modal-actions">
            <button class="ink-btn" id="registerConfirmBtn">落款完成</button>
          </div>
        </div>
      </div>

      <div class="modal-mask" id="renameModal">
        <div class="scroll-modal">
          <div class="modal-title">改名卷轴</div>
          <div class="form-row">
            <label class="form-label" for="renameInput">新的名字</label>
            <input id="renameInput" class="text-input" maxlength="8" placeholder="请输入新名字" />
          </div>
          <div class="modal-actions">
            <button class="ink-btn" id="renameConfirmBtn">确认改名</button>
            <button class="ink-btn" id="renameCancelBtn">暂且作罢</button>
          </div>
        </div>
      </div>

      <div class="modal-mask" id="fortuneModal">
        <div class="scroll-modal">
          <div class="modal-title">今日运势签</div>

          <div class="fortune-grid">
            <div class="fortune-item">
              <h4>事业</h4>
              <div class="fortune-num" id="careerNum">--</div>
              <canvas id="careerBar" class="fortune-bar" width="220" height="16"></canvas>
            </div>
            <div class="fortune-item">
              <h4>爱情</h4>
              <div class="fortune-num" id="loveNum">--</div>
              <canvas id="loveBar" class="fortune-bar" width="220" height="16"></canvas>
            </div>
            <div class="fortune-item">
              <h4>健康</h4>
              <div class="fortune-num" id="healthNum">--</div>
              <canvas id="healthBar" class="fortune-bar" width="220" height="16"></canvas>
            </div>
            <div class="fortune-item">
              <h4>财运</h4>
              <div class="fortune-num" id="wealthNum">--</div>
              <canvas id="wealthBar" class="fortune-bar" width="220" height="16"></canvas>
            </div>
          </div>

          <div class="fortune-meta" id="fortuneMeta">
            贵人生肖：--<br/>
            幸运数字：--<br/>
            幸运颜色：--<br/>
            喜神方位：--
          </div>

          <div class="fortune-list-wrap">
            <div class="fortune-list">
              <h4>宜</h4>
              <ul id="yiList"></ul>
            </div>
            <div class="fortune-list">
              <h4>忌</h4>
              <ul id="jiList"></ul>
            </div>
          </div>

          <div class="fortune-meta" id="fortunePoem">
            签文：--
          </div>

          <div class="modal-actions">
            <button class="ink-btn" id="drawLotBtn">再求一签</button>
            <button class="ink-btn" id="closeFortuneBtn">收起卷轴</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.umd.js"></script>
  <script>
    const APP = {
      scene:null,
      camera:null,
      renderer:null,
      clock:null,
      mixers:[],
      raycaster:new THREE.Raycaster(),
      mouse:new THREE.Vector2(),
      pig:null,
      pigRoot:null,
      pigParts:{},
      currentOutfit:null,
      outfitGroup:null,
      accessoryAnchor:null,
      seasonalGroup:null,
      propsGroup:null,
      particlesGroup:null,
      shadowPlane:null,
      state:{
        mood:"happy",
        sleeping:false,
        busy:false,
        currentTimePhase:"day",
        selectedFood:"cake",
        activeParticles:[],
        earTargetL:0,
        earTargetR:0,
        nextEarFlap:0
      },
      userData:null,
      ui:{}
    };
  </script>
</body>
</html>
