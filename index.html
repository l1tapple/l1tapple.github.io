<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>水墨福猪 · 黄道吉日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', 'Microsoft YaHei', serif;
        }

        body {
            min-height: 100vh;
            background: #1a2e1f; /* 水墨深绿底 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #app {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 900px;
            max-height: 95vh;
            background: radial-gradient(circle at 30% 20%, #1e3a2a, #0c1e12);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(180,160,120,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #efe6d2;
            border: 1px solid #6a5e45;
        }

        /* 水墨纹理叠加 (伪) */
        #app::after {
            content: "";
            position: absolute;
            top:0;left:0;width:100%;height:100%;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.08"/></svg>');
            pointer-events: none;
            z-index: 5;
        }

        #bubble-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 30;
        }

        .bubble-nose {
            position: absolute;
            bottom: -50px;
            font-size: 30px;
            opacity: 0.5;
            filter: drop-shadow(0 0 8px #b8a88c);
            animation: floatUp linear forwards;
            pointer-events: none;
            color: #d9b8a4;
            text-shadow: 2px 2px 3px #3a2a1e;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.7); opacity: 0.3; }
            100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
        }

        #main-interface {
            position: relative;
            z-index: 20;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 18px 16px 12px;
            backdrop-filter: blur(2px);
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        #main-interface.show {
            opacity: 1;
            pointer-events: auto;
        }

        .exit-btn {
            position: absolute;
            top: 18px; right: 18px;
            width: 44px; height: 44px;
            background: rgba(70, 40, 20, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 300;
            color: #ecdcc0;
            border: 2px solid #b89b7a;
            box-shadow: 0 4px 10px #1e160e;
            cursor: pointer;
            z-index: 50;
            transition: 0.2s;
            font-family: 'KaiTi';
        }
        .exit-btn:hover { background: #5e3e28; color: #fff3e0; }

        .header-section {
            text-align: center;
            margin-bottom: 12px;
        }
        .auspicious-day {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #1f2c1a;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #efe0c1, #c9af7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .weather-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 45, 30, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1.5px solid #b6a07e;
            font-size: 15px;
            color: #efe3cd;
        }

        .fortune-area {
            display: flex;
            justify-content: center;
            margin: 8px 0 10px;
        }
        .fortune-btn {
            background: rgba(150, 130, 90, 0.25);
            backdrop-filter: blur(12px);
            border: 2.5px solid #cdbb9a;
            border-radius: 60px;
            padding: 14px 36px;
            font-size: 26px;
            font-weight: bold;
            color: #f5ebdb;
            box-shadow: 0 6px 16px #0f1a0b;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 10px;
            text-shadow: 1px 1px 2px #1f2a12;
        }
        .fortune-btn:active { transform: scale(0.96); background: #7f6e4e55; }

        .pet-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(30, 45, 25, 0.35);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            padding: 16px 10px 10px;
            border: 1.5px solid #a3916b;
            margin-top: 6px;
        }

        .pet-canvas-container {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
        }

        canvas#petCanvas {
            width: 100%;
            max-width: 300px;
            height: auto;
            aspect-ratio: 1/1;
            filter: drop-shadow(0 8px 12px #1f2a15);
            cursor: pointer;
        }

        .happiness-bar-wrap {
            margin: 8px 12px 4px;
            height: 14px;
            background: #2f3f2a;
            border-radius: 20px;
            overflow: hidden;
            border: 1.5px solid #ac9a70;
        }
        #happinessFill {
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, #d4b37a, #f3e1b3);
            border-radius: 20px;
            transition: width 0.4s;
            box-shadow: inset 0 1px 3px #fbf3dd;
        }

        .action-rings {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 10px 0 6px;
        }
        .ring-item {
            width: 75px;
            height: 75px;
            background: rgba(230, 220, 200, 0.25);
            backdrop-filter: blur(16px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2.5px solid #ddd2b2;
            box-shadow: 0 4px 12px #1d2818, inset 0 0 10px #efe6cf55;
            font-size: 38px;
            cursor: pointer;
            transition: 0.2s;
            color: #30281c;
        }
        .ring-item:active { transform: scale(0.9); background: #cdbb9a80; }

        .pet-tip {
            font-size: 12px; text-align: center; opacity: 0.9;
            margin-top: 6px;
            color: #dbcfb0;
        }

        .offline-notice {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 30, 15, 0.8);
            backdrop-filter: blur(12px);
            color: #f5e7cb;
            padding: 12px 24px;
            border-radius: 60px;
            border: 2px solid #c8af7a;
            z-index: 100;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 运势弹窗——水墨祥云边框不留白 */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #0f1a0e90; backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        .fortune-modal {
            width: 350px;
            background: rgba(235, 225, 200, 0.25);
            backdrop-filter: blur(25px);
            border: 4px solid transparent;
            border-image: repeating-linear-gradient(45deg, #f3e9d2, #bdaa82, #efe2c6) 30;
            border-radius: 60px 60px 50px 50px;
            padding: 24px 18px 20px;
            box-shadow: 0 20px 40px #00000077, inset 0 0 40px #fff3db55;
            color: #202818;
            text-shadow: 0 1px 2px #eadbba;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        /* 祥云背景 (不留白) */
        .fortune-modal::before {
            content: "";
            position: absolute;
            top:0;left:0;width:100%;height:100%;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M20,40 Q30,20 50,30 Q70,10 80,30 Q95,40 80,60 Q70,80 50,70 Q30,85 20,65 Q5,55 20,40" fill="%23dfd2b5" opacity="0.15"/><path d="M70,70 Q85,65 90,80 Q85,95 70,90 Q60,95 65,80 Q55,75 70,70" fill="%23cdbb9a" opacity="0.2"/></svg>');
            background-size: 120px 120px;
            background-repeat: repeat;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }
        .fortune-modal > * { position: relative; z-index: 2; }
        .stat-row { display: flex; align-items: center; margin: 12px 0; }
        .stat-label { width: 70px; font-size: 18px; }
        .stat-bar-bg { flex:1; height: 14px; background: #4d4632; border-radius: 20px; margin:0 8px; border:1px solid #a58e5f; }
        .stat-bar-fill { height: 14px; border-radius: 20px; background: #c9aa6b; width: 70%; box-shadow: inset 0 0 6px #ffefc0; }
        .lucky-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0; }
        .close-modal { text-align: center; margin-top: 20px; }
        .close-modal span { background: #8f7e58; padding: 10px 35px; border-radius: 40px; color: #faf3e0; font-size: 18px; border: 1px solid #cfbc8e; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div class="exit-btn" id="exitApp">✕</div>
    <div id="bubble-layer"></div>
    
    <div id="offlineNotice" class="offline-notice">🐷 水墨小猪等你归来</div>

    <div id="main-interface">
        <div class="header-section">
            <div class="auspicious-day" id="auspiciousText">乙巳年 三月初九 宜祈福</div>
            <div class="weather-panel">
                <span>🌤️ 23° 烟雨</span>
                <span>☀️ 紫外线 弱 · 披件薄衫</span>
            </div>
            <div style="font-size:14px; margin-top: 4px;">👘 棉麻长衫 · 防晒纸伞</div>
        </div>

        <div class="fortune-area">
            <div class="fortune-btn" id="fortuneBtn">☯ 运 势 ☯</div>
        </div>

        <div class="pet-section">
            <div class="pet-canvas-container">
                <canvas id="petCanvas" width="320" height="320"></canvas>
            </div>
            <div class="happiness-bar-wrap">
                <div id="happinessFill" style="width: 80%;"></div>
            </div>
            <div class="action-rings">
                <div class="ring-item" id="feedRing">🍰</div>
                <div class="ring-item" id="drinkRing">🧃</div>
                <div class="ring-item" id="sleepRing">🌸</div>
            </div>
            <div class="pet-tip">轻点小猪戏耍 · 喂饮安眠</div>
        </div>
    </div>
</div>

<div id="fortuneModal" class="modal-overlay hidden">
    <div class="fortune-modal">
        <h3 style="text-align:center; color:#2d2b16; font-size: 28px; margin-bottom: 10px;">🐖 福运祥云</h3>
        <div class="stat-row"><span class="stat-label">事业</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:78%"></div></div><span>78</span></div>
        <div class="stat-row"><span class="stat-label">爱情</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:65%"></div></div><span>65</span></div>
        <div class="stat-row"><span class="stat-label">健康</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:88%"></div></div><span>88</span></div>
        <div class="stat-row"><span class="stat-label">财运</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:72%"></div></div><span>72</span></div>
        <div class="lucky-grid">
            <div>🐅 贵人: 虎</div><div>🔢 数字: 3,8</div>
            <div>🎨 颜色: 赭石金</div><div>🧭 喜神: 东南</div>
        </div>
        <div>✅ 适宜: 签约 · 出行 · 雅集</div>
        <div>❌ 忌讳: 动土 · 争讼</div>
        <div class="close-modal"><span id="closeModalBtn">关 闭</span></div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 存储 ----------
        const STORAGE_HAPPINESS = 'pig_happy';
        const STORAGE_LAST = 'pig_last';
        const STORAGE_SLEEP = 'pig_sleep';
        
        let happiness = 80;
        let isSleeping = false;
        let lastInteractionTime = Date.now();
        
        // 动画状态
        let eatProgress = 0;      // 0-1
        let drinkProgress = 0;
        let playProgress = 0;
        let sleepAnim = 0;        // 睡觉/起床过渡
        let animFrame = null;
        
        const canvas = document.getElementById('petCanvas');
        const ctx = canvas.getContext('2d');
        const happinessFill = document.getElementById('happinessFill');
        
        // 初始化存储与离线衰减
        function initFromStorage() {
            const savedHappy = localStorage.getItem(STORAGE_HAPPINESS);
            const savedLast = localStorage.getItem(STORAGE_LAST);
            const savedSleep = localStorage.getItem(STORAGE_SLEEP);
            const now = Date.now();
            if (savedHappy !== null) {
                happiness = parseFloat(savedHappy);
                lastInteractionTime = savedLast ? parseInt(savedLast) : now;
                isSleeping = savedSleep === 'true';
                
                if (!isSleeping) {
                    const hours = (now - lastInteractionTime) / 3600000;
                    if (hours >= 1) {
                        const dec = Math.floor(hours) * 20;
                        const old = happiness;
                        happiness = Math.max(0, happiness - dec);
                        if (old - happiness > 0) showOffline(`离墨 ${Math.floor(hours)} 时辰，福气略减`);
                        lastInteractionTime = now;
                    }
                }
            } else {
                happiness = 80;
                lastInteractionTime = now;
                isSleeping = false;
            }
            happiness = Math.min(100, Math.max(0, happiness));
        }
        function showOffline(msg) {
            const el = document.getElementById('offlineNotice');
            el.textContent = msg;
            el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 4000);
        }
        function persist() {
            localStorage.setItem(STORAGE_HAPPINESS, happiness);
            localStorage.setItem(STORAGE_LAST, lastInteractionTime);
            localStorage.setItem(STORAGE_SLEEP, isSleeping);
        }
        
        initFromStorage();
        updateHappinessUI();
        persist();

        // 气泡: 猪鼻子
        function startBubbles() {
            const layer = document.getElementById('bubble-layer');
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const nose = document.createElement('div');
                    nose.className = 'bubble-nose';
                    nose.textContent = '🐽';
                    nose.style.left = Math.random() * 95 + '%';
                    nose.style.animationDuration = (4 + Math.random() * 6) + 's';
                    nose.style.fontSize = (22 + Math.floor(Math.random()*30)) + 'px';
                    layer.appendChild(nose);
                    setTimeout(() => nose.remove(), 10000);
                }, i * 70);
            }
            setTimeout(() => document.getElementById('main-interface').classList.add('show'), 2500);
        }
        startBubbles();

        // 绘画——水墨Q版猪 + 动画
        function drawPet() {
            ctx.clearRect(0, 0, 320, 320);
            ctx.shadowColor = '#3f321e';
            ctx.shadowBlur = 10;
            
            // 根据开心值表情
            let mood = 'happy';
            if (isSleeping) mood = 'sleep';
            else if (happiness > 60) mood = 'happy';
            else if (happiness > 40) mood = 'sad';
            else if (happiness > 20) mood = 'verysad';
            else mood = 'angry';
            
            // 水墨笔触
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#5f4e32';
            ctx.fillStyle = '#eacdb0';
            
            // 身体 (水墨晕染效果)
            ctx.beginPath();
            ctx.ellipse(160, 180, 75, 65, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            // 肚皮
            ctx.fillStyle = '#f7e3ca';
            ctx.beginPath();
            ctx.ellipse(160, 190, 55, 45, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#8f7a58';
            ctx.stroke();
            
            // 耳朵
            ctx.fillStyle = '#dbb094';
            ctx.beginPath(); ctx.ellipse(105, 120, 22, 30, -0.25, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(215, 120, 22, 30, 0.25, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            
            // 鼻子 (猪鼻子)
            ctx.fillStyle = '#b5766a';
            ctx.beginPath(); ctx.ellipse(160, 195, 20, 15, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#6d4c3d'; ctx.stroke();
            ctx.fillStyle = '#4a3122';
            ctx.beginPath(); ctx.arc(150, 192, 4, 0, 2*Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(170, 192, 4, 0, 2*Math.PI); ctx.fill();
            
            // 眼睛和表情
            ctx.fillStyle = '#1f1a0e';
            if (mood === 'sleep') {
                ctx.beginPath(); ctx.arc(130, 148, 7, 0, Math.PI, true); ctx.fill();
                ctx.beginPath(); ctx.arc(190, 148, 7, 0, Math.PI, true); ctx.fill();
                ctx.font = 'bold 26px "KaiTi"'; ctx.fillStyle = '#36573b'; ctx.fillText('💤', 210, 100);
            } else {
                ctx.beginPath(); ctx.arc(130, 148, 7, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(190, 148, 7, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = '#f5eedd'; 
                ctx.beginPath(); ctx.arc(125, 142, 3,0,2*Math.PI); ctx.fill(); 
                ctx.beginPath(); ctx.arc(185, 142, 3,0,2*Math.PI); ctx.fill();
                
                ctx.strokeStyle = '#3a2e1c'; ctx.lineWidth = 3;
                if (mood === 'angry') {
                    ctx.beginPath(); ctx.moveTo(115,130); ctx.lineTo(140,138); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(205,130); ctx.lineTo(180,138); ctx.stroke();
                } else if (mood === 'sad' || mood === 'verysad') {
                    ctx.beginPath(); ctx.moveTo(115,142); ctx.lineTo(140,135); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(205,142); ctx.lineTo(180,135); ctx.stroke();
                }
            }
            
            // 进食/喝水/玩耍动画
            if (eatProgress > 0) {
                ctx.font = '38px "Segoe UI Emoji"'; ctx.fillStyle = '#ebc47f';
                ctx.fillText('🍰', 220, 70);
                ctx.fillText('✨', 180, 50);
                eatProgress *= 0.8; if(eatProgress<0.02) eatProgress=0;
            }
            if (drinkProgress > 0) {
                ctx.font = '38px "Segoe UI Emoji"'; ctx.fillStyle = '#a5d1e0';
                ctx.fillText('🧃', 220, 80);
                drinkProgress *= 0.8; if(drinkProgress<0.02) drinkProgress=0;
            }
            if (playProgress > 0) {
                ctx.font = '34px sans'; ctx.fillStyle = '#d4bc8a';
                ctx.fillText('🌸', 80, 60);
                ctx.fillText('✨', 240, 130);
                playProgress *= 0.8; if(playProgress<0.01) playProgress=0;
            }
            
            // 水墨印章
            ctx.font = '18px "KaiTi"'; ctx.fillStyle = '#916e4b'; ctx.fillText('福', 250, 280);
            requestAnimationFrame(drawPet);
        }
        drawPet();

        function updateHappinessUI() { happinessFill.style.width = happiness + '%'; }
        function modifyHappiness(delta, interact = true) {
            happiness = Math.min(100, Math.max(0, happiness + delta));
            updateHappinessUI();
            if (interact) lastInteractionTime = Date.now();
            persist();
        }

        // 互动
        function feed() { if(isSleeping) return; eatProgress = 1.0; modifyHappiness(20); randomFood(); }
        function drink() { if(isSleeping) return; drinkProgress = 1.0; modifyHappiness(10); }
        function play() { if(isSleeping) return; playProgress = 1.0; modifyHappiness(2); }
        
        const foods = ['🍰','🍦','🥤'];
        function randomFood() { document.getElementById('feedRing').textContent = foods[Math.floor(Math.random()*3)]; }
        randomFood();
        
        function goSleep() { if(isSleeping) return; isSleeping = true; modifyHappiness(5); persist(); }
        function wake() { if(!isSleeping) return; isSleeping = false; modifyHappiness(15); persist(); }
        
        // 自动作息
        function autoCheck() {
            const h = new Date().getHours();
            const ring = document.getElementById('sleepRing');
            if (h>=7 && h<9) { ring.textContent = '🐓'; if(isSleeping) wake(); }
            else if (h>=9 && h<21) ring.textContent = ['🌸','🌼','🌺'][Math.floor(Math.random()*3)];
            else { ring.textContent = '🛏️💤'; if(!isSleeping) goSleep(); }
        }
        setInterval(() => { autoCheck(); applyDecay(); }, 60000);
        autoCheck();
        
        function applyDecay() {
            if(isSleeping) return;
            const hours = (Date.now() - lastInteractionTime)/3600000;
            if(hours>=1) { const dec = Math.floor(hours)*20; if(dec>0) modifyHappiness(-dec, false); lastInteractionTime = Date.now(); persist(); }
        }
        applyDecay();

        // 事件绑定
        canvas.addEventListener('click', play);
        document.getElementById('feedRing').addEventListener('click', feed);
        document.getElementById('drinkRing').addEventListener('click', drink);
        document.getElementById('sleepRing').addEventListener('click', ()=>{
            const h = new Date().getHours();
            if(h>=7&&h<9) wake(); else if(h>=21||h<7) goSleep();
        });
        
        // 运势弹窗
        const modal = document.getElementById('fortuneModal');
        document.getElementById('fortuneBtn').addEventListener('click', ()=> modal.classList.remove('hidden'));
        document.getElementById('closeModalBtn').addEventListener('click', ()=> modal.classList.add('hidden'));
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.add('hidden'); });
        
        // 退出：关闭标签页
        document.getElementById('exitApp').addEventListener('click', ()=>{
            persist();
            window.close();
            // 若无法关闭则跳转空白
            setTimeout(() => { window.location.href = 'about:blank'; }, 50);
        });
        
        // 黄历
        function updateAuspicious() {
            const d = new Date();
            document.getElementById('auspiciousText').innerText = `乙巳年 ${d.getMonth()+1}月${d.getDate()}日 · 宜纳福`;
        }
        updateAuspicious();
        window.addEventListener('beforeunload', persist);
    })();
</script>
</body>
</html>
